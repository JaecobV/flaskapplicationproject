<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>PC Builder</title>
</head>
<body>


<!-- NAVBAR -->
<div class="navbar">
    <a href="/">Home</a>
    <a href="#">GPU</a>
    <a href="#">CPU</a>
    <a href="#">Motherboard</a>
    <a href="#">RAM</a>
    <a href="#">Storage</a>
    <a href="#">PSU</a>
</div>


<div class="container">

        <div class="parts-section">
        <h2>Available Parts</h2>


        {% for part in parts %}
        <div class="card">
            <h3>{{ part["Part_Name"] }}</h3>
            <p><strong>Category:</strong> {{ part["Category"] }}</p>
            <p><strong>Brand:</strong> {{ part["Part_Name"].split()[0] }}</p>
            <p><strong>Price:</strong> ${{ part["Price"] }}</p>


        <a href="{{ url_for('add_part', id=part['Part_ID']) }}">
            <button>Add to Build</button>
        </a>
        </div>
        {% endfor %}
    </div>
